name: Lint (Biome)
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  biome:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download Biome
        run: |
          curl -L https://github.com/biomejs/biome/releases/download/v1.8.3/biome-linux-x64.gz -o biome.gz
          gunzip biome.gz
          chmod +x biome
      - name: Lint
        run: ./biome lint .
