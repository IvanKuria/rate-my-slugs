name: Lint (Biome)
on:
  pull_request:
  push:
    branches: [main]

jobs:
  biome:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: biomejs/setup-biome@v2
        with:
          biome-version: 1.8.3
      - name: Biome version
        run: biome --version
      - name: Lint
        run: biome lint .
      - name: Format check (no writes)
        run: biome format --write=false .
