name: Lint (Biome via npx)
on:
  pull_request:
  push:
    branches: [main]

jobs:
  biome-npx:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20" }
      - name: Lint
        run: npx --yes @biomejs/biome@1.8.3 lint .
      - name: Format check
        run: npx --yes @biomejs/biome@1.8.3 format --write=false .
