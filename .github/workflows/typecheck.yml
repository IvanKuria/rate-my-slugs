name: Typecheck

# Type-checks the extension on every push and pull request. WXT's Vite build
# transpiles without type-checking, so this `tsc --noEmit` gate is what actually
# enforces type safety.

on:
  push:
    branches: ['**']
  pull_request:

permissions:
  contents: read

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run build
